<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超・簡単HTMLゲームメーカー Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background-color: #121212; color: #e0e0e0; overflow: hidden; }
        
        /* スタートアップ画面 */
        #startup-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background-color: #1e1e1e; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.7); width: 450px; border: 1px solid #333; }
        .modal-content h2 { margin-bottom: 20px; color: #4CAF50; font-size: 1.6rem; }
        .modal-content button { display: block; width: 100%; padding: 15px; margin: 12px 0; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .modal-content button.preset { background-color: #2196F3; color: white; }
        .modal-content button.blank { background-color: #424242; color: white; }
        .modal-content button:hover { transform: translateY(-2px); opacity: 0.9; }

        /* 全体レイアウト */
        #sidebar { width: 320px; background-color: #1e1e1e; border-right: 1px solid #333; display: flex; flex-direction: column; height: 100vh; }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 20px; }
        #workspace { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; }
        #editor-container { flex-grow: 1; display: flex; height: calc(100vh - 50px); }
        
        /* ヘッダー・ツールバー */
        #toolbar { height: 50px; background-color: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .run-btn { background-color: #4CAF50; color: white; border: none; padding: 8px 20px; font-size: 1rem; font-weight: bold; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .run-btn:hover { background-color: #45a049; }

        h3 { font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin: 20px 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .tool-btn { display: block; width: 100%; padding: 10px; margin-bottom: 8px; background-color: #2d2d2d; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; text-align: left; font-size: 0.85rem; transition: 0.2s; }
        .tool-btn:hover { background-color: #3d3d3d; border-color: #2196F3; }

        /* エディタ & プレビュー */
        .panel { flex: 1; display: flex; flex-direction: column; position: relative; }
        .panel-title { background-color: #1a1a1a; padding: 5px 15px; font-size: 0.8rem; color: #aaa; border-bottom: 1px solid #333; font-family: monospace; }
        textarea { flex-grow: 1; background-color: #151515; color: #a9b7c6; border: none; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 13px; resize: none; outline: none; line-height: 1.5; }
        iframe { flex-grow: 1; background-color: #000; border: none; }
        #preview-panel { border-left: 1px solid #333; }
    </style>
</head>
<body>

    <div id="startup-modal">
        <div class="modal-content">
            <h2>新規プロジェクト</h2>
            <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 25px;">ベースとなる状態を選択してください</p>
            <button class="blank" onclick="startProject('blank')">📄 1からつくる (最小構成HTML)</button>
            <button class="preset" onclick="startProject('tactical_2d')">🎮 プリセット: 2DタクティカルFPS風</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-scroll">
            <h3>⚔️ 武器・弾道システム</h3>
            <button class="tool-btn" onclick="addCode('weapon_shotgun')">💥 ショットガン化 (3方向拡散)</button>
            <button class="tool-btn" onclick="addCode('weapon_reload')">🔋 リロードシステム (残弾制限+Rキー)</button>
            
            <h3>👾 エネミー拡張</h3>
            <button class="tool-btn" onclick="addCode('enemy_boss')">👑 巨大ボス出現 (HPバー表示付き)</button>
            
            <h3>✨ ビジュアル・演出</h3>
            <button class="tool-btn" onclick="addCode('fx_shake')">🫨 射撃時の画面揺れ (スクリーンシェイク)</button>
            <button class="tool-btn" onclick="addCode('fx_particle')">✨ 火花パーティクル (敵命中時の火花)</button>
        </div>
    </div>

    <div id="workspace">
        <div id="toolbar">
            <span style="font-weight: bold; color: #fff;">簡単HTMLゲームメーカー <span style="color:#2196F3;">Pro</span></span>
            <button class="run-btn" onclick="runGame()">▶ ゲームを実行する</button>
        </div>

        <div id="editor-container">
            <div class="panel">
                <div class="panel-title">SOURCE CODE (EDITABLE)</div>
                <textarea id="outputCode" spellcheck="false"></textarea>
            </div>
            <div class="panel" id="preview-panel">
                <div class="panel-title">LIVE PREVIEW</div>
                <iframe id="previewFrame"></iframe>
            </div>
        </div>
    </div>

    <script>
        const outputCode = document.getElementById('outputCode');
        const previewFrame = document.getElementById('previewFrame');
        const modal = document.getElementById('startup-modal');

        // ベースとなるHTMLテンプレート (スマート挿入用の目印を3か所に設置)
        const baseTemplate = `<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Generated Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0b0b; font-family: sans-serif; }
        canvas { display: block; background: #1a1a1a; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; font-size: 18px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="scoreWindow">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 画面サイズ設定
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- [1. 変数・システム定義スロット] ---
        let score = 0;
        /* __SLOT_VARIABLES__ */

        // --- [2. アップデートロジックスロット] ---
        function updateGame() {
            /* __SLOT_UPDATE__ */
        }

        // --- [3. 描画ロジックスロット] ---
        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            /* __SLOT_DRAW__ */
        }

        // メインループ
        function loop() {
            updateGame();
            drawGame();
            requestAnimationFrame(loop);
        }
        loop();
    <\/script>
</body>
</html>`;

        // プリセットデータ
        const presets = {
            blank: baseTemplate,
            tactical_2d: baseTemplate
                .replace('/* __SLOT_VARIABLES__ */', `
        let player = { x: canvas.width / 2, y: canvas.height / 2, size: 20, speed: 4, angle: 0 };
        let keys = {};
        let bullets = [];
        let enemies = [];
        
        // キーボード入力 (WASD対応)
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        
        // マウス位置でプレイヤーの向きを計算
        window.addEventListener('mousemove', e => {
            player.angle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
        });

        // クリックで射撃
        window.addEventListener('mousedown', e => {
            let dx = e.clientX - player.x;
            let dy = e.clientY - player.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            bullets.push({ x: player.x, y: player.y, vx: (dx/dist) * 12, vy: (dy/dist) * 12 });
        });

        // iPad等タッチ操作対応（画面スワイプで移動、タップで射撃）
        let touchStart = null;
        window.addEventListener('touchstart', e => {
            if(e.touches.length === 1) {
                touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        });
        window.addEventListener('touchmove', e => {
            if(!touchStart) return;
            let dx = e.touches[0].clientX - touchStart.x;
            let dy = e.touches[0].clientY - touchStart.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if(dist > 5) {
                player.x += (dx/dist) * player.speed;
                player.y += (dy/dist) * player.speed;
                player.angle = Math.atan2(dy, dx);
            }
        });
        window.addEventListener('touchend', () => touchStart = null);

        // 定期的に敵をスポーン
        setInterval(() => {
            if(enemies.length < 15) {
                let rx = Math.random() * canvas.width;
                let ry = Math.random() * canvas.height;
                if(Math.random() > 0.5) rx = Math.random() > 0.5 ? 0 : canvas.width;
                else ry = Math.random() > 0.5 ? 0 : canvas.height;
                enemies.push({ x: rx, y: ry, speed: 2, hp: 1 });
            }
        }, 1200);
        /* __SLOT_VARIABLES__ */`)
                .replace('/* __SLOT_UPDATE__ */', `
            // プレイヤー移動処理
            if (keys['w'] || keys['a'] || keys['s'] || keys['d']) {
                if (keys['w']) player.y -= player.speed;
                if (keys['s']) player.y += player.speed;
                if (keys['a']) player.x -= player.speed;
                if (keys['d']) player.x += player.speed;
            }

            // 弾の移動処理
            for(let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bullets[i].vx;
                bullets[i].y += bullets[i].vy;
                if(bullets[i].x < 0 || bullets[i].x > canvas.width || bullets[i].y < 0 || bullets[i].y > canvas.height) {
                    bullets.splice(i, 1);
                }
            }

            // 敵の追従処理 & 当たり判定
            for(let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                let dx = player.x - e.x;
                let dy = player.y - e.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                e.x += (dx/dist) * e.speed;
                e.y += (dy/dist) * e.speed;

                // 弾との当たり判定
                for(let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    let bdx = b.x - e.x;
                    let bdy = b.y - e.y;
                    let bdist = Math.sqrt(bdx*bdx + bdy*bdy);
                    if(bdist < 15) {
                        e.hp--;
                        bullets.splice(j, 1);
                        if(typeof triggerParticle === 'function') triggerParticle(e.x, e.y); // パーティクル連動用
                        break;
                    }
                }

                if(e.hp <= 0) {
                    enemies.splice(i, 1);
                    score += 100;
                    document.getElementById('scoreWindow').innerText = score;
                }
            }
            /* __SLOT_UPDATE__ */`)
                .replace('/* __SLOT_DRAW__ */', `
            // 敵の描画
            ctx.fillStyle = '#ff3333';
            enemies.forEach(e => {
                ctx.beginPath();
                ctx.arc(e.x, e.y, 12, 0, Math.PI*2);
                ctx.fill();
            });

            // 弾の描画
            ctx.fillStyle = '#ffeb3b';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
                ctx.fill();
            });

            // プレイヤーの描画 (向きに合わせて回転)
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = '#2196F3';
            ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
            // 銃口の線
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(20,0); ctx.stroke();
            ctx.restore();
            /* __SLOT_DRAW__ */`)
        };

        // 機能拡張用コードモジュール
        const codeModules = {
            weapon_shotgun: {
                slot: '/* __SLOT_VARIABLES__ */',
                code: `
        // マウスダウン射撃をショットガン（3方向）に上書き
        window.addEventListener('mousedown', e => {
            let dx = e.clientX - player.x;
            let dy = e.clientY - player.y;
            let baseAngle = Math.atan2(dy, dx);
            let spread = 0.2; // 拡散角度
            [baseAngle - spread, baseAngle, baseAngle + spread].forEach(angle => {
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12 });
            });
        });
                `
            },
            weapon_reload: {
                slot: '/* __SLOT_VARIABLES__ */',
                code: `
        let ammo = 10;
        let isReloading = false;
        // 既存のUIに弾薬表示を追加
        document.getElementById('ui').innerHTML += ' | AMMO: <span id="ammoWin">10</span>';
        
        // 既存のリモートクリックイベント等の前に弾薬チェックを挟むロジック
        window.addEventListener('keydown', e => {
            if(e.key.toLowerCase() === 'r' && ammo < 10 && !isReloading) {
                isReloading = true;
                document.getElementById('ammoWin').innerText = "RELOADING...";
                setTimeout(() => { ammo = 10; isReloading = false; document.getElementById('ammoWin').innerText = ammo; }, 1500);
            }
        });
        // ※発射処理の内部で ammo-- する処理を書き足すとさらにリアルになります。
                `
            },
            enemy_boss: {
                slot: '/* __SLOT_VARIABLES__ */',
                code: `
        // 定期的にボスを出現させる
        setInterval(() => {
            enemies.push({ x: canvas.width/2, y: 0, speed: 1, hp: 50, isBoss: true, maxHp: 50 });
        }, 15000);
                `,
                slot_draw: `
            // ボス専用のHPバー描画ロジックを追記
            enemies.forEach(e => {
                if(e.isBoss) {
                    ctx.fillStyle = 'red';
                    ctx.fillRect(e.x - 30, e.y - 25, 60, 6);
                    ctx.fillStyle = 'green';
                    ctx.fillRect(e.x - 30, e.y - 25, 60 * (e.hp / e.maxHp), 6);
                }
            });
                `
            },
            fx_shake: {
                slot: '/* __SLOT_VARIABLES__ */',
                code: `
        let shakeTime = 0;
        window.addEventListener('mousedown', () => { shakeTime = 10; });
                `,
                slot_draw: `
            // 画面揺れエフェクト
            if(shakeTime > 0) {
                let dx = (Math.random() - 0.5) * 8;
                let dy = (Math.random() - 0.5) * 8;
                ctx.translate(dx, dy);
                shakeTime--;
            }
                `
            },
            fx_particle: {
                slot: '/* __SLOT_VARIABLES__ */',
                code: `
        let particles = [];
        function triggerParticle(x, y) {
            for(let i=0; i<8; i++) {
                particles.push({ x: x, y: y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 20 });
            }
        }
                `,
                slot_update: `
            for(let i=particles.length-1; i>=0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                if(particles[i].life <= 0) particles.splice(i, 1);
            }
                `,
                slot_draw: `
            ctx.fillStyle = '#ff9800';
            particles.forEach(p => {
                ctx.fillRect(p.x, p.y, 3, 3);
            });
                `
            }
        };

        // プロジェクト選択
        function startProject(key) {
            outputCode.value = presets[key];
            modal.style.display = 'none';
            runGame(); // 最初の一回を自動実行
        }

        // コードのインジェクション（スロット置換方式）
        function addCode(moduleKey) {
            let current = outputCode.value;
            const module = codeModules[moduleKey];

            // メインの変数/初期化スロットへの挿入
            if(current.includes(module.slot)) {
                current = current.replace(module.slot, module.code + "\n        " + module.slot);
            }

            // 特殊なアップデート・描画スロット指示がある場合
            if(module.slot_update && current.includes('/* __SLOT_UPDATE__ */')) {
                current = current.replace('/* __SLOT_UPDATE__ */', module.slot_update + "\n            /* __SLOT_UPDATE__ */");
            }
            if(module.slot_draw && current.includes('/* __SLOT_DRAW__ */')) {
                current = current.replace('/* __SLOT_DRAW__ */', module.slot_draw + "\n            /* __SLOT_DRAW__ */");
            }

            outputCode.value = current;
            outputCode.focus();
        }

        // 実行ボタンの処理（iframeにコードを動的に注入）
        function runGame() {
            const code = outputCode.value;
            // iframeの古い内容を完全に消去して再描画
            previewFrame.srcdoc = code;
        }
    </script>
</body>
</html>

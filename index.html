<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡単HTMLゲームメーカー</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #1e1e1e;
            color: #fff;
        }
        #sidebar {
            width: 300px;
            background-color: #2d2d2d;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        #main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #555; padding-bottom: 10px; }
        .tool-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .tool-btn:hover { background-color: #45a049; }
        
        .upload-area {
            background-color: #3d3d3d;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        input[type="file"] { width: 100%; margin-top: 10px; }

        #preview-area {
            flex-grow: 1;
            background-color: #000;
            border: 2px dashed #555;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }
        canvas {
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        
        #code-area {
            height: 200px;
            display: flex;
            flex-direction: column;
        }
        textarea {
            flex-grow: 1;
            background-color: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #555;
            padding: 10px;
            font-family: monospace;
            resize: none;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>機能を追加</h2>
        <button class="tool-btn" onclick="addCode('init')">1. 基本セット(Canvas設定)を追加</button>
        <button class="tool-btn" onclick="addCode('playerMove')">2. プレイヤー移動(WASD+スワイプ対応)を追加</button>
        <button class="tool-btn" onclick="addCode('gameLoop')">3. ゲームループを追加</button>

        <h2>ボスのテクスチャ設定</h2>
        <div class="upload-area">
            <label>画像をアップロードしてプレビュー:</label>
            <input type="file" id="bossUpload" accept="image/*">
        </div>
    </div>

    <div id="main">
        <h2>プレビュー (アップロードしたテクスチャの確認)</h2>
        <div id="preview-area">
            <canvas id="gameCanvas" width="640" height="360"></canvas>
        </div>

        <div id="code-area">
            <h2>自動生成コード</h2>
            <textarea id="outputCode" readonly></textarea>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const outputCode = document.getElementById('outputCode');
        
        // 生成するコードのテンプレート集
        const codeTemplates = {
            init: `// --- 基本設定 ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
`,
            playerMove: `// --- プレイヤーと移動処理 (PCキーボード & iPadスワイプ対応) ---
let player = { x: canvas.width/2, y: canvas.height/2, speed: 5, size: 30 };
let keys = {};

// キーボード入力
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// スワイプ・タッチ操作（iPad等の画面用）
let touchStartX = 0;
let touchStartY = 0;
canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
});
canvas.addEventListener('touchmove', e => {
    let dx = e.touches[0].clientX - touchStartX;
    let dy = e.touches[0].clientY - touchStartY;
    player.x += dx * 0.1;
    player.y += dy * 0.1;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
});

function updatePlayer() {
    if (keys['w']) player.y -= player.speed;
    if (keys['s']) player.y += player.speed;
    if (keys['a']) player.x -= player.speed;
    if (keys['d']) player.x += player.speed;
}
`,
            gameLoop: `// --- メインループ ---
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // プレイヤーの更新と描画
    if(typeof updatePlayer === 'function') updatePlayer();
    
    ctx.fillStyle = 'blue';
    ctx.fillRect(player.x, player.y, player.size, player.size);
    
    requestAnimationFrame(loop);
}
loop();
`
        };

        // コードをテキストエリアに追記する関数
        function addCode(type) {
            outputCode.value += codeTemplates[type] + "\n";
            outputCode.scrollTop = outputCode.scrollHeight; // 一番下までスクロール
        }

        // ボスのテクスチャアップロードとプレビュー処理
        document.getElementById('bossUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // プレビューのキャンバスをクリアして中央に描画
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // アスペクト比を維持して描画（最大200x200）
                    let scale = Math.min(200 / img.width, 200 / img.height);
                    let w = img.width * scale;
                    let h = img.height * scale;
                    let x = (canvas.width - w) / 2;
                    let y = (canvas.height - h) / 2;
                    
                    ctx.drawImage(img, x, y, w, h);
                    
                    // 画像の読み込みコードも自動生成エリアに追加する
                    outputCode.value += `// --- ボスのテクスチャロード ---
const bossImg = new Image();
bossImg.src = '${event.target.result.substring(0, 30)}...'; // Base64データの省略形
// 実際の開発では、保存した画像のパスを指定してください
`;
                    outputCode.scrollTop = outputCode.scrollHeight;
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>

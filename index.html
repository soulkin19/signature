<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電子署名システム</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Meiryo, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: #2563eb;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .content {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #374151;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 16px;
        }
        .signature-area {
            border: 2px dashed #9ca3af;
            border-radius: 8px;
            background: #f9fafb;
            margin: 20px 0;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: white;
            cursor: crosshair;
            touch-action: none;
        }
        .buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #2563eb;
            color: white;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary {
            background: #6b7280;
            color: white;
        }
        .btn-secondary:hover { background: #4b5563; }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover { background: #dc2626; }
        .preview {
            margin-top: 30px;
            border: 1px solid #e5e7eb;
            padding: 20px;
            border-radius: 8px;
            background: #f8fafc;
        }
        .signature-preview {
            text-align: center;
            margin-top: 20px;
        }
        footer {
            text-align: center;
            padding: 15px;
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 電子署名システム</h1>
            <p>簡単・安全・法的に有効な電子署名</p>
        </header>

        <div class="content">
            <div class="form-group">
                <label>契約書タイトル</label>
                <input type="text" id="title" value="業務委託契約書" placeholder="契約書タイトルを入力">
            </div>

            <div class="form-group">
                <label>署名者名</label>
                <input type="text" id="name" placeholder="山田 太郎" value="山田 太郎">
            </div>

            <div class="form-group">
                <label>役職・所属</label>
                <input type="text" id="position" placeholder="代表取締役" value="代表取締役">
            </div>

            <div class="signature-area">
                <label style="padding: 15px 15px 0 15px;">署名欄（マウスまたは指で署名してください）</label>
                <canvas id="canvas" width="700" height="300"></canvas>
            </div>

            <div class="buttons">
                <button class="btn-danger" onclick="clearCanvas()">🗑️ クリア</button>
                <button class="btn-secondary" onclick="undoLast()">↩️ 1つ戻す</button>
                <button class="btn-primary" onclick="saveSignature()">💾 PNGで保存</button>
                <button class="btn-primary" onclick="generatePDF()">📄 PDFで保存</button>
            </div>

            <div class="preview">
                <h3>プレビュー</h3>
                <div id="previewContent" style="border: 1px solid #ccc; padding: 20px; background: white; min-height: 200px;">
                    <h2 id="previewTitle" style="text-align:center;">業務委託契約書</h2>
                    <p style="text-align:right; margin-top: 80px;">署名：</p>
                    <div id="signaturePreview" class="signature-preview"></div>
                    <p style="text-align:right;" id="previewName">山田 太郎</p>
                    <p style="text-align:right;" id="previewDate"></p>
                </div>
            </div>
        </div>

        <footer>
            このデモはHTML + JavaScriptのみで動作します。<br>
            実際の運用時はサーバー側での証明書・タイムスタンプ対応をおすすめします。
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let lastX = 0;
        let lastY = 0;
        let history = [];

        // キャンバス初期化
        function initCanvas() {
            ctx.strokeStyle = "#1f2937";
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            clearCanvas();
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            history = [];
            updatePreview();
        }

        function undoLast() {
            if (history.length > 0) {
                history.pop();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                history.forEach(path => {
                    ctx.beginPath();
                    ctx.moveTo(path[0].x, path[0].y);
                    for (let i = 1; i < path.length; i++) {
                        ctx.lineTo(path[i].x, path[i].y);
                    }
                    ctx.stroke();
                });
                updatePreview();
            }
        }

        // マウスイベント
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // タッチイベント（スマホ対応）
        canvas.addEventListener('touchstart', handleTouchStart);
        canvas.addEventListener('touchmove', handleTouchMove);
        canvas.addEventListener('touchend', stopDrawing);

        function startDrawing(e) {
            drawing = true;
            const pos = getMousePos(e);
            lastX = pos.x;
            lastY = pos.y;
            history.push([{x: lastX, y: lastY}]);
        }

        function draw(e) {
            if (!drawing) return;
            const pos = getMousePos(e);
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();

            history[history.length - 1].push({x: pos.x, y: pos.y});

            lastX = pos.x;
            lastY = pos.y;
            updatePreview();
        }

        function stopDrawing() {
            drawing = false;
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        }

        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        }

        // PNG保存
        function saveSignature() {
            const link = document.createElement('a');
            link.download = '電子署名.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // PDF生成
        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const title = document.getElementById('title').value || "契約書";
            const name = document.getElementById('name').value || "署名者";
            const position = document.getElementById('position').value || "";

            doc.setFont("helvetica", "bold");
            doc.setFontSize(20);
            doc.text(title, 105, 30, { align: "center" });

            doc.setFontSize(12);
            doc.text("上記内容に同意の上、電子署名をいたします。", 20, 80);

            // 署名画像を追加
            const signatureData = canvas.toDataURL('image/png');
            doc.addImage(signatureData, 'PNG', 30, 120, 120, 60);

            doc.text(name, 40, 200);
            if (position) doc.text(position, 40, 210);

            const date = new Date().toLocaleDateString('ja-JP');
            doc.text(date, 140, 200);

            doc.save(`${title}_署名済.pdf`);
        }

        // プレビュー更新
        function updatePreview() {
            const preview = document.getElementById('signaturePreview');
            preview.innerHTML = '';
            
            if (canvas.toDataURL('image/png').length > 1000) {
                const img = document.createElement('img');
                img.src = canvas.toDataURL('image/png');
                img.style.maxWidth = '300px';
                img.style.maxHeight = '120px';
                preview.appendChild(img);
            }

            document.getElementById('previewTitle').textContent = 
                document.getElementById('title').value || "契約書";
            
            document.getElementById('previewName').textContent = 
                document.getElementById('name').value || "署名者";
            
            const dateEl = document.getElementById('previewDate');
            dateEl.textContent = new Date().toLocaleDateString('ja-JP', {
                year: 'numeric', month: 'long', day: 'numeric'
            }) + " 署名";
        }

        // 入力変更時にプレビュー更新
        document.getElementById('title').addEventListener('input', updatePreview);
        document.getElementById('name').addEventListener('input', updatePreview);
        document.getElementById('position').addEventListener('input', updatePreview);

        // 初期化
        window.onload = function() {
            initCanvas();
            updatePreview();
        };
    </script>
</body>
</html>
